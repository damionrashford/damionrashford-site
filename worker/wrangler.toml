name = "dr-contact"
main = "src/index.js"
compatibility_date = "2026-06-01"

[vars]
# FROM_EMAIL: Resend test sender until you verify damionrashford.com in Resend,
# then change to e.g. "Portfolio <hello@damionrashford.com>"
FROM_EMAIL = "Portfolio <onboarding@resend.dev>"
ALLOWED_ORIGIN = "https://damionrashford.com"

# Secrets (NOT in this file — kept off the public repo). Set with:
#   wrangler secret put RESEND_API_KEY
#   wrangler secret put TO_EMAIL        ← your destination email lives here, server-side only
